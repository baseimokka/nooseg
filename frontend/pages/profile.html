<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — NOOS</title>
  <link rel="icon" type="image/jpeg" href="/images/favicon.jpg">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/nav.css?v=3">
  <style>
    .profile-layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 62px); }
    .profile-sidebar { background: var(--paper2); border-right: 1px solid var(--hair-d); padding: 32px 0; }
    .profile-avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--grn); display: flex; align-items: center; justify-content: center; font-family: var(--f-lux); font-size: 24px; color: var(--paper); margin: 0 auto 14px; }
    .profile-name { font-family: var(--fb); font-size: 14px; font-weight: 500; text-align: center; padding: 0 18px; color: var(--ink); }
    .profile-email { font-family: var(--fb); font-size: 11px; color: var(--ink-50); text-align: center; padding: 4px 18px 20px; }
    .profile-divider { border: none; border-top: 1px solid var(--hair-d); margin: 0 0 12px; }
    .profile-nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 22px; font-family: var(--fb); font-size: 12px; letter-spacing: .04em; color: var(--ink-70); cursor: pointer; border-left: 2px solid transparent; text-decoration: none; transition: background .2s ease, color .2s ease; }
    .profile-nav-item i { font-size: 16px; }
    .profile-nav-item:hover { background: rgba(28,28,26,0.03); color: var(--ink); }
    .profile-nav-item.active { background: var(--card); color: var(--grn2); border-left-color: var(--grn); }
    .profile-nav-item.logout { color: var(--red); border-top: 1px solid var(--hair-d); margin-top: 12px; padding-top: 16px; }
    .profile-main { background: var(--paper); padding: clamp(28px,4vw,56px); }
    .profile-eyebrow { font-family: var(--fb); font-size: 11px; font-weight: 500; letter-spacing: .34em; text-transform: uppercase; color: var(--grn2); margin-bottom: 12px; display: block; }
    .profile-section-title { font-family: var(--f-lux); font-weight: 400; font-size: clamp(34px,4vw,56px); letter-spacing: .02em; line-height: .96; margin-bottom: 28px; color: var(--ink); }
    .profile-sub-title { font-family: var(--f-lux); font-weight: 400; font-size: clamp(22px,2.4vw,30px); letter-spacing: .02em; color: var(--ink); margin-bottom: 16px; }
    .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .profile-main .form-input, .profile-main .form-select { background: var(--card); border-color: var(--hair-d); }
    .address-card { background: var(--card); padding: 16px 18px; border: 1px solid var(--hair-d); margin-bottom: 10px; font-size: 13px; color: var(--ink-70); line-height: 1.7; }
    .profile-rule { border: none; border-top: 1px solid var(--hair-d); margin: 36px 0; }
    @media (max-width: 600px) {
      .profile-layout { grid-template-columns: 1fr; min-height: unset; }
      .profile-sidebar { border-right: none; border-bottom: 1px solid var(--hair-d); padding: 20px 0; }
      .profile-avatar { width: 52px; height: 52px; font-size: 18px; }
      .form-2col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="lux-page">
  <script src="/js/preloader.js"></script>
  <div id="nav-root"></div>
  <div id="cart-root"></div>
  <div id="auth-root"></div>

  <div class="breadcrumb">
    <a href="/">Home</a>
    <i class="ti ti-chevron-right"></i>
    <span class="current">My Profile</span>
  </div>

  <div class="profile-layout">
    <aside class="profile-sidebar">
      <div class="profile-avatar" id="profile-avatar">N</div>
      <div class="profile-name" id="profile-name">Loading...</div>
      <div class="profile-email" id="profile-email"></div>
      <hr class="profile-divider">
      <a class="profile-nav-item active" href="/profile"><i class="ti ti-user"></i> My Profile</a>
      <a class="profile-nav-item" href="/orders"><i class="ti ti-receipt"></i> Orders</a>
      <a class="profile-nav-item" href="/wishlist"><i class="ti ti-heart"></i> Wishlist</a>
      <div class="profile-nav-item logout" onclick="signOut()"><i class="ti ti-logout"></i> Sign Out</div>
    </aside>

    <main class="profile-main">
      <span class="profile-eyebrow">Your Account</span>
      <h2 class="profile-section-title">My Profile</h2>
      <form onsubmit="saveProfile(event)">
        <div class="form-2col">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input class="form-input" id="prof-firstname" type="text" placeholder="Ahmed">
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input class="form-input" id="prof-lastname" type="text" placeholder="Hassan">
          </div>
        </div>
        <div class="form-group" style="margin-bottom:14px;">
          <label class="form-label">Email</label>
          <input class="form-input" id="prof-email" type="email" disabled style="opacity:0.6;">
        </div>
        <div class="form-group" style="margin-bottom:20px;">
          <label class="form-label">Phone</label>
          <input class="form-input" id="prof-phone" type="tel" placeholder="01xxxxxxxxx">
        </div>
        <button type="submit" class="btn-green" style="padding:11px 22px;">Save Changes</button>
      </form>

      <hr class="profile-rule">

      <h3 class="profile-sub-title">Default Address</h3>
      <div id="address-section">
        <div style="color:var(--ink-50);font-size:13px;">No address saved.</div>
      </div>

      <hr class="profile-rule">

      <h3 class="profile-sub-title">Change Password</h3>
      <form onsubmit="changePassword(event)">
        <div class="form-group" style="margin-bottom:14px;">
          <label class="form-label">Current Password</label>
          <input class="form-input" id="pw-current" type="password" placeholder="••••••••">
        </div>
        <div class="form-group" style="margin-bottom:14px;">
          <label class="form-label">New Password</label>
          <input class="form-input" id="pw-new" type="password" placeholder="••••••••">
        </div>
        <div class="form-group" style="margin-bottom:20px;">
          <label class="form-label">Confirm New Password</label>
          <input class="form-input" id="pw-confirm" type="password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary" style="padding:11px 22px;">Update Password</button>
      </form>
    </main>
  </div>

  <div id="footer-root"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js?v=3"></script>
  <script>
    document.getElementById('nav-root').innerHTML = renderNav('');
    document.getElementById('cart-root').innerHTML = renderCartSidebar();
    document.getElementById('auth-root').innerHTML = renderAuthModal();
    document.getElementById('footer-root').innerHTML = renderFooter();
    initLayout();

    if (!Auth.isLoggedIn()) { window.location.href = '/'; }

    async function loadProfile() {
      try {
        const data = await API.me();
        const u = data.user;
        const nameParts = u.name.split(' ');
        document.getElementById('profile-avatar').textContent = (nameParts[0][0] + (nameParts[1]?.[0] || '')).toUpperCase();
        document.getElementById('profile-name').textContent = u.name;
        document.getElementById('profile-email').textContent = u.email;
        document.getElementById('prof-firstname').value = nameParts[0] || '';
        document.getElementById('prof-lastname').value = nameParts.slice(1).join(' ') || '';
        document.getElementById('prof-email').value = u.email;
        document.getElementById('prof-phone').value = u.phone || '';

        if (data.addresses && data.addresses.length > 0) {
          const def = data.addresses.find(a => a.is_default) || data.addresses[0];
          document.getElementById('address-section').innerHTML = `
            <div class="address-card">
              <strong>${def.full_name}</strong><br>
              ${def.area ? def.area + ', ' : ''}${def.city}<br>
              ${def.address}
            </div>
          `;
        }
      } catch (err) { console.error(err); }
    }

    async function saveProfile(e) {
      e.preventDefault();
      const firstName = document.getElementById('prof-firstname').value.trim();
      const lastName = document.getElementById('prof-lastname').value.trim();
      const phone = document.getElementById('prof-phone').value.trim();
      try {
        await API.updateProfile({ name: `${firstName} ${lastName}`.trim(), phone });
        Toast.success('Profile updated');
        const user = Auth.getUser();
        user.name = `${firstName} ${lastName}`.trim();
        Auth.setSession(Auth.getToken(), user);
        loadProfile();
      } catch (err) { Toast.error(err.message); }
    }

    async function changePassword(e) {
      e.preventDefault();
      const current = document.getElementById('pw-current').value;
      const newPw = document.getElementById('pw-new').value;
      const confirm = document.getElementById('pw-confirm').value;
      if (newPw !== confirm) { Toast.error('Passwords do not match'); return; }
      try {
        await API.changePassword({ currentPassword: current, newPassword: newPw });
        Toast.success('Password changed');
        document.getElementById('pw-current').value = '';
        document.getElementById('pw-new').value = '';
        document.getElementById('pw-confirm').value = '';
      } catch (err) { Toast.error(err.message); }
    }

    function signOut() {
      Auth.clear();
      window.location.href = '/';
    }

    loadProfile();
  </script>
</body>
</html>
