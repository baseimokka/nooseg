<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — NOOS</title>
  <meta name="robots" content="noindex,follow">
  <link rel="icon" type="image/jpeg" href="/images/favicon.jpg">
  <link rel="canonical" href="https://nooseg.com/404">
  <meta property="og:title" content="Page Not Found — NOOS">
  <meta property="og:type" content="website">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/nav.css?v=7">
  <style>
    .nf{min-height:72vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:7rem 1.5rem 4rem}
    .nf__code{font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,18vw,11rem);line-height:.9;letter-spacing:.04em;color:var(--ink)}
    .nf h1{font-size:clamp(1.3rem,4vw,1.9rem);margin:.4rem 0 .75rem;color:var(--ink)}
    .nf p{color:var(--ink-70,#555);max-width:440px;line-height:1.8;margin-bottom:2rem}
    .nf__actions{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
  </style>
</head>
<body class="lux-page">
  <script src="/js/preloader.js"></script>
  <div id="nav-root"></div>
  <div id="cart-root"></div>
  <div id="auth-root"></div>

  <div class="nf">
    <div class="nf__code">404</div>
    <h1>This page is out of stock</h1>
    <p>The page you're looking for doesn't exist or has moved. Let's get you back to the good stuff.</p>
    <div class="nf__actions">
      <a href="/" class="btn btn-primary">Back Home</a>
      <a href="/shop" class="btn btn-outline">Browse the Shop</a>
    </div>
  </div>

  <div id="footer-root"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js?v=7"></script>
  <script>
    document.getElementById('nav-root').innerHTML = renderNav('');
    document.getElementById('footer-root').innerHTML = renderFooter();
    initLayout();
  </script>
</body>
</html>
